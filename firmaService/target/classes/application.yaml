server:
  port: 8081

spring:
  application:
    name: firma-service

  datasource:
    url: jdbc:postgresql://localhost:5433/gestion_revistas
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: publicaciones
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false

  flyway:
    enabled: true
    schemas: publicaciones
    locations: classpath:db/migration
    baseline-on-migrate: true

app:
  firmaec:
    base-url: http://localhost:8180/servicio
    api-key: "1b6e325b1851d6f167c0a2c8e3ceb8ca727e92106992bf973b028c1bb7aff849"
    sistema: test-system
    version: 4.1.0
